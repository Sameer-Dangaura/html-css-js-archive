<!-- Example: to converting the string uppercase and lowercase: -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>JavaScript String Methods</h1>
    <p>converting string to uppercase:</p>

    <button onclick="upper()">Click button</button>
    <p id="upper">hello world</p>


    <p>converting string to lowercase:</p>
    
    <button onclick="lower()">Click button</button>
    <p id="lower">HELLO WORLD</p>

    <script src="scripts.js"></script>  <!--linking external js file-->
</body>
</html>
