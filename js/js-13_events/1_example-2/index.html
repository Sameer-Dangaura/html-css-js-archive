<!-- Example: In the following example, an onclick attribute (with code), is added to a <button> element:
    
the code changes the content of its own element (using this.innerHTML): 
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>JavaScript HTML Events</h1>
    <h2>The onclick Attribute</h2>

    <button onclick="this.innerHTML=Date()">The time is?</button>
    <!-- Here, Date() (without new) returns a string representing the current date and time. 

    This button element with the given attribute having given value(code), gonna changes the content of its own element (using this.innerHTML): 

    Here,
    -> this refers to the button element itself (<button>).
    -> this.innerHTML = Date(); updates the button's text with the current date and time.
    -->
</body>
</html>
