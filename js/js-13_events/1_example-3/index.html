<!-- JavaScript code is often several lines long. It is more common to see event attributes calling functions: -->


<!-- Example: In the following example, an onclick attribute (with JS function call), is added to a <button> element:
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>JavaScript HTML Events</h1>
    <h2>The onclick Attribute</h2>

    <button onclick="DisplayTime()">The time is?</button>
    <!-- event attributes gonna call JS function which lies in external script file. -->

    <p id="demo"></p>

    <script src="scripts.js"></script>  <!--linking external js file-->
</body>
</html>
