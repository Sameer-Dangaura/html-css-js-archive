<!-- Example: In the following example, an onclick attribute (with code), is added to a <button> element:
    
the JavaScript code changes the content of the element with id="demo". 
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>JavaScript HTML Events</h1>
    <h2>The onclick Attribute</h2>

    <button onclick="document.getElementById('demo').innerHTML=Date()">The time is?</button>
    <!-- Here, Date() (without new) returns a string representing the current date and time. 

    This button element with the given attribute having given value(code), gonna updates the <p id="demo"> element with the current date and time.
    -->

    <p id="demo"></p>
</body>
</html>
