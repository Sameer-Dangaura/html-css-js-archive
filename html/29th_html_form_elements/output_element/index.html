<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>The output element:</h2>
    <p>The output element represents the result of a calculation.</p>

    <form action="/action_page.php" oninput="x.value = parseInt(a.value) + parseInt(b.value)">
        0
        <input type="range" id="a" name="a" value="50">
        100 +
        <input type="number" id="b" name="b" value="50">
        =
        <output name="x" for="a b">100</output> 
        <br><br>

        <input type="submit" value="Submit">

    </form>
</body>
</html>

<!-- 
* Let's understand, what happpened above:
=>

This HTML form allows users to input values and instantly see the sum of those values without submitting the form. Here's how it works:

Breakdown:
----------

1) <form> element:
------------------
The action="/action_page.php" means when the form is submitted, the data will be sent to a PHP page (action_page.php). This is the backend part that would typically handle the form data.

The oninput attribute triggers a JavaScript expression whenever there's a change in input fields. Here, the code is updating the value of an output element called x by adding two values (a and b).


2) First Input Field (<input type="range">):
--------------------------------------------
The slider (type="range") allows the user to select a number between a defined range (in this case, it defaults to 0-100).

Its value (value="50") starts at 50. As the user moves the slider, the value of a changes.


3) Second Input Field (<input type="number">):
----------------------------------------------
This input allows the user to enter a number manually. The initial value is set to 50.


4) oninput Event:
-----------------
This event fires whenever the value of any input field inside the form changes. The JavaScript inside the oninput attribute recalculates the sum of a and b.

x.value=parseInt(a.value)+parseInt(b.value) adds the integer values of the two inputs (a and b), and the result is stored in x.


5) <output> Element:
---------------------
The <output> tag is used to display the result of the calculation in real-time.

The name="x" allows this element to be referenced within the form (in the JavaScript expression).

for="a b" is an optional attribute that indicates the form fields whose values are reflected in the output (not functionally necessary for this simple case).


6) Submit Button:
------------------
The submit button allows the user to submit the form data, which will be sent to /action_page.php. However, the dynamic calculation (summing a and b) happens without submitting the form.


How It Works:
--------------
As the user interacts with either the slider (a) or number input (b), the sum of their values is automatically displayed in the <output> element.

You can submit the form, but the dynamic calculation is handled client-side through JavaScript, and no page refresh is required to see the result.


Example:
---------
If the user sets the slider to 60 and the number input to 30, the output will show 90 instantly because of the oninput event.

-->
