<!-- HTML document for <meta> information  for practicing <head> element: -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Practice of head element">
    <meta name="keywords" content="HTML, head element, meta tags">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Example of Head Element</title>
</head>
<body>
     <!-- Body content goes here -->
      <p>Here we used meta elements.</p>
</body>
</html>

<!-- 
Explanation:
------------

<meta charset="UTF-8">:
 Sets the character encoding to UTF-8, which is standard and ensures correct display of text.

<meta name="description" content="Practice of head element">:
 Provides a brief summary of the document. This description could appear in search engine results if this page were indexed.

<meta name="keywords" content="HTML, head element, meta tags">:
 Lists keywords related to the content of the page. Even though the keywords tag is not used by modern search engines, it's fine to include it for practice or internal documentation purposes.

<meta name="viewport" content="width=device-width, initial-scale=1.0">:
 Ensures that the page is responsive and scales correctly on different devices.

<title>Example of Head Element</title>:
 Sets the title of the page, which is displayed in the browser's title bar or tab. -->
