<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>This is heading</h1>

    <p id="demo" > This is paragraph. Lorem ipsum dolor sit amet consectetur adipisicing elit. Iste ullam dolorum nemo delectus voluptates veritatis officiis nam repellat odit itaque.</p>


    <button type="button" onclick="myFunction()">Click to change content  </button>

<!----------------------------------------------------------------------->
<!-- So what is happening using <button> element. -->
<!----------------------------------------------------------------------->
<!--ans:-->

<!-- This is an HTML button element with an onclick event attribute that triggers a JavaScript function when the button is clicked. Let'sbreak it down:

1) <button type="button">:

This defines a button element. The type="button" attribute specifies that this button is a simple clickable button (as opposed to a submit button in a form).


2) onclick="myFunction()":

This attribute specifies a JavaScript function to be executed when the button is clicked. Here, it calls a function named myFunction().


3) Click to change content:

This is the text that will be displayed on the button. Users will see this text and click the button to trigger the action.


Here's how it all works together:

When the button is clicked, the browser will execute the myFunction() JavaScript function. This function can be defined in a <script> tag within the HTML document or in an external JavaScript file linked to the HTML document. -->

<!------------------------------------------------------------------------>

    <!-- Linking external js file: -->
    <script src="scripts/scripts.js"></script>
    
</body>
</html>
