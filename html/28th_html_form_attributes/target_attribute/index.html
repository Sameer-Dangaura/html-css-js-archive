<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Target Attributes:</h2>
    <p>This form response will be displayed in a new window or tab. </p>
    <form action="" target="_blank">

        <!-- Since,the action attribute is omitted or empty so the action is set to the current page eventhough in a new window or tab. -->

        <label for="fname"> First Name </label><br>

        <input type="text" id="fname" name="fname"><br>

        <label for="lname"> Last Name </label><br>

        <input type="text" id="lname" name="lname"><br><br>
        
        <input type="submit" value="Submit"><br>
    </form>
</body>
</html>
