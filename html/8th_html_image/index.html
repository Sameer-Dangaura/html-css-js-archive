    <h2>Animated images:</h2>

    <h2>Image float left or right of text:</h2>

    <p><img src="https://www.adorama.com/alc/wp-content/uploads/2021/05/bird-wings-flying.gif" alt="bird wings flying GIF image" style="float:right; width: 130px; height: 70px;">
        The image will float right of text:</p>
