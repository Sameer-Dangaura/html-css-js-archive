<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/index.css">
</head>
<body>
    <h1>Iframe Example:</h1>
    <p>Here we gonna use iframe element.</p>
    <iframe src="computer.html" title="iframe example" style=" width: 1200px; height: 300px;">
    </iframe>
    <hr>
    <h2>Iframe - target for a link:</h2>
    <iframe src="computer.html" name="iframe_id" title="iframe example" ></iframe><br>
    <a href="index.html" target="iframe_id" >my own web page</a>
</body>
</html>
