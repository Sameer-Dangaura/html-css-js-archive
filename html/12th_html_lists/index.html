<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Lists:</h1>
    <hr>
    <h2>Unorderd list:</h2>
    <ul>
        <li>Coffee</li>
        <li>Tea</li>
        <li>Milk</li>
    </ul>
    <h2>Orderd lists:</h2>
    <ol>
        <li>Coffee</li>
        <li>Tea</li>
        <li>Milk</li>
    </ol>
    <h2>Descriptive lists:</h2>
    <dl>
        <dt>Coffee</dt>
        <dd>-black hot drink</dd>
        <dt>Milk</dt>
        <dd>-white cold drink</dd>
    </dl>
</body>
</html>
