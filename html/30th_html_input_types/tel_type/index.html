<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Telephone Field:</h2>
    <p>The <strong>input type="tel"</strong> is used for input fields that should contain a telephone number:</p>

    <form action="/action_page.php">
        <label for="telephone">Enter your telephone:</label><br>
        <input type="tel" id="telephone" name="telephone" placeholder="123-45-678" pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}" required><br><br>
        <small>Format: 123-45-678</small><br><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
<!-- 
Q. What are the uses of those attributes, which are used in <input type="tel" ...> ?
Ans:
* placeholder:
 The input placeholder attribute specifies a short hint that describes the expected value of an input field (a sample value or a short description of the expected format).

* pattern:
 The input pattern attribute specifies a regular expression that the input field's value is checked against, when the form is submitted.

* required:
 The input required attribute specifies that an input field must be filled out before submitting the form.
 
-->
