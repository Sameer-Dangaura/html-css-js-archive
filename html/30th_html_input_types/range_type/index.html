<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Range Field</h2>
    <p>Depending on browser support: The input type "range" can be displayed as a slider control.</p>
    <p>Here, we used step=10 ,so range will increment or decrement by 10 steps.</p>

    <form action="action_page.php">
        <label for="vol">Select volume (0-50):</label>
        <input type="range" id="vol" name="vol" min="0" max="50" step="10">
        <input type="submit" value="Submit">
    </form>
</body>
</html>
