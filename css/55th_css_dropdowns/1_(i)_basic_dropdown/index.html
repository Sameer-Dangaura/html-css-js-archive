<!-- Basic Dropdown
Create a dropdown box that appears when the user moves the mouse over an element. 

-------------------------------------------------------
Tip: Do visit it's document file also for explaination.
-------------------------------------------------------

# We have also done like this example in "51th_css_pseudo_classes/simple_tooltip_hover". It is logically similar.


STEP-1:
------
-> make position of .dropdown to relative,  which is needed when we want the dropdown content to be placed right below the dropdown button (using position:absolute).

-> make position of .dropdown-content to absolute.

-->



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .dropdown{
            position: relative;
            display: inline-block;
            border: 1px solid black;
        }
        .dropdown-content{
            position: absolute;
            border: 1px solid blue;
            min-width: 100%;    /* If you want the width of the dropdown content to be as wide as the dropdown button, set the width to 100% */
        }
    </style>
</head>
<body>
    <h1>Hoverable dropdown</h1>
    <p>Move the mouse over the text below to open the dropdown content.</p>

    <div class="dropdown">
        <span>Mouse over me</span>  <!--Do visit it's document file for understand why we used <span>.-->

        <div class="dropdown-content">
            <p>Hello World!</p>
        </div>

    </div>
</body>
</html>
