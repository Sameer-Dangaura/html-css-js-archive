<!-- Basic Dropdown
Create a dropdown box that appears when the user moves the mouse over an element. 

-------------------------------------------------------
Tip: Do visit it's document file also for explaination.
-------------------------------------------------------

# We have also done like this example in "51th_css_pseudo_classes/simple_tooltip_hover". It is logically similar.


STEP-3:
------
-> Hide the .dropdown-content and only display it when the mouse cursor is over the .dropdown container.

-->



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .dropdown{
            position: relative;
            display: inline-block;
            border: 1px solid black;    /* you can remove border. I just used it to understand how the relative positioned and absolute positioned element are acting. */
        }
        .dropdown-content{
            display: none;
            position: absolute;
            border: 1px solid blue; /* you can remove border, if you want. */
            min-width: 160px;   
            background-color: #f9f9f9;
            box-shadow: 2px 2px 5px 0px rgba(0,0,0,0.2);
            padding: 12px 16px;
            z-index: 1; /* making the dropdown-content placed    in front. */
        }
        .dropdown:hover .dropdown-content {
            display: block; /* making the .dropdown-content visible when the mouse cursor over the .dropdown container. */
        }
    </style>
</head>
<body>
    <h1>Hoverable dropdown</h1>
    <p>Move the mouse over the text below to open the dropdown content.</p>

    <div class="dropdown">
        <span>Mouse over me</span>  <!--Do visit it's document file for understand why we used <span>.-->

        <div class="dropdown-content">
            <p>Hello World!</p>
        </div>

    </div>
</body>
</html>
