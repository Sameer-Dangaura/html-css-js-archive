<!-- This example demonstrates the different types of cursors (can be useful for links): -->




<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>The cursor Property</h1>

    <span style="cursor: text;">Here cursor will convert to text.</span><br>
    <span style="cursor: progress;">Here cursor will convert to progress.</span><br>
    <span style="cursor: wait;">Here cursor will convert to wait.</span><br>
</body>
</html>
