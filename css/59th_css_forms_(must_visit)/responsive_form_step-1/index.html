<!-- Responsive Form: 
- When the screen is less than 600px wide, make the two columns stack on top of each other instead of next to each other. 


STEP-1: Observe them how they are arranged and how much they are taking space using border property.


-->




<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            box-sizing: border-box;
        }
        .row{
            width: 100%;
            border: 1px solid red;
        }
        .col-25{
            border: 1px solid rgb(7, 210, 255);
            width: 25%;
        }
        .col-75{
            border: 1px solid blue;
            width: 75%;
        }
    </style>
</head>
<body>
    <h1>Responsive Form</h1>
    <p>Resize the browser window to see the effect. When the screen is less than 600px wide, make the two columns stack on top of each other instead of next to each other.</p>

    <div class="form-container">
        <form action="/action_page.php">

            <div class="row">
                <div class="col-25">
                    <label for="fname">First Name</label>
                </div>

                <div class="col-75">
                    <input type="text" id="fname" name="fname" placeholder="Enter your first name">
                </div>
            </div>

            <div class="row">
                <div class="col-25">
                    <label for="lname">Last Name</label>
                </div>

                <div class="col-75">
                    <input type="text" id="lname" name="lname" placeholder="Enter your last name">
                </div>
            </div>

            <div class="row">
                <div class="col-25">
                    <label for="country">Select your country</label>
                </div>

                <div class="col-75">
                    <select name="country" id="country">
                        <option value="nepal">Nepal</option>
                        <option value="india">India</option>
                        <option value="america">America</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-25">
                    <label for="subject">Subject</label>
                </div>

                <div class="col-75">
                    <textarea name="subject" id="subject" placeholder="Write something..." style="height: 200px;"></textarea>
                </div>
            </div>

            <div class="row">
                <input type="submit" value="Submit">
            </div>

        </form>
    </div>
</body>
</html>
