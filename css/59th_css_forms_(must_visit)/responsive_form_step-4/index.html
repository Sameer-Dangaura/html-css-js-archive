<!-- Responsive Form: 
- When the screen is less than 600px wide, make the two columns stack on top of each other instead of next to each other. 


STEP-4: since, <input>, <select>, <textarea>, <button> element were overflowing right side so, I added padding of row from right side. Preventing from right overflow.

Again, I revisited this to fix above mentioned right overflow problem while working on "61th_css_website_layout".

After again revisited, I found problem that:
- I had used unwanted margin for <input>, <select>, <textarea>, <button>. you can see in "responsive_form_step-3" I haven't changed there.

In this what I change:
- remove unwanted margin's form <input>, <select>, <textarea>, <button> and added margin for '.row'.

And you can compare between "responsive_form_step-3" and "responsive_form_step-4".

-->




<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            box-sizing: border-box;
        }
        .row{
            width: 100%;
            border: 1px solid red;
            margin: 4px 0px;    /* added margin for row. */
        }
        .col-25{
            border: 1px solid rgb(6, 247, 255);
            width: 25%;
            float: left;
        }
        .col-75{
            border: 1px solid blue;
            width: 75%;
            float: left;
        }
        .row::after{
            content: "";
            clear: both;
            display: table;
        }
        input[type="text"], select, textarea{
            display: block; /* making block level element. */
            width:100%; /* setting width 100% of col-75 whose width is 75% of 'row div container'. */
            padding: 12px 8px;  /* Giving better look. */
            margin: 0px;    /* set margin 0px. */
        }
        label{
            display: block; /* making block level element. */
            padding: 12px 8px;  /* Giving better look having same as <input> style. */
        }
        input[type="submit"]{
            display: block; /* making block level element. */
            width: 100%;    /* setting width: 100% of row whose width is also 100%. */

            /* unwanted margin removed by me. */

            padding: 12px 14px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h1>Responsive Form</h1>
    <p>Resize the browser window to see the effect. When the screen is less than 600px wide, make the two columns stack on top of each other instead of next to each other.</p>

    <div class="form-container">
        <form action="/action_page.php">

            <div class="row">
                <div class="col-25">
                    <label for="fname">First Name</label>
                </div>

                <div class="col-75">
                    <input type="text" id="fname" name="fname" placeholder="Enter your first name">
                </div>
            </div>

            <div class="row">
                <div class="col-25">
                    <label for="lname">Last Name</label>
                </div>

                <div class="col-75">
                    <input type="text" id="lname" name="lname" placeholder="Enter your last name">
                </div>
            </div>

            <div class="row">
                <div class="col-25">
                    <label for="country">Select your country</label>
                </div>

                <div class="col-75">
                    <select name="country" id="country">
                        <option value="nepal">Nepal</option>
                        <option value="india">India</option>
                        <option value="america">America</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-25">
                    <label for="subject">Subject</label>
                </div>

                <div class="col-75">
                    <textarea name="subject" id="subject" placeholder="Write something..." style="height: 200px;"></textarea>
                </div>
            </div>

            <div class="row">
                <input type="submit" value="Submit">
            </div>

        </form>
    </div>
</body>
</html>
