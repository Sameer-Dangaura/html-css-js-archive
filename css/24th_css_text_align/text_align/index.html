<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            text-align: center;
        }
        h2{
            text-align: left;
        }
        h3{
            text-align: right;
        }
    </style>
</head>
<body>
    <h1>Heading 1 (Centered)</h1>
    <h2>Heading 2 (Left aligned)</h2>
    <h3>Heading 3 (Right aligned)</h3>

    <p>The three headings above are aligned center, left and right.</p>
</body>
</html>
