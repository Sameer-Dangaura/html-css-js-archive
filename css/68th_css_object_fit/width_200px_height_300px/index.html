<!-- This is just a exaple for setting width and height to 200px and 300px of image_from_paris.

However, if we style the image above to be half its width (200 pixels) and same height (300 pixels), it will look like this: -->



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img{
            width: 200px;
            height: 300px;
        }
    </style>
</head>
<body>
    <h1>This is just a exaple for setting width and height to 200px and 300px of image_from_paris</h1>
    <img src="../img/image_from_paris.png" alt="image from paris">
</body>
</html>
