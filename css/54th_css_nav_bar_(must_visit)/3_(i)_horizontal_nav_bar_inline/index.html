<!-- One way to build a horizontal navigation bar is to specify the <li> elements as inline, in addition to the "standard" code from the previous page:
    
Instead of specifying <li> elements as inline we can specify with inline-block, which make us able to take control of width and height of elements. -->



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ul {        
            list-style-type: none;  
            padding: 0px;   
            margin: 0px;    
        }
        li{
            display: inline-block;  /* By default, <li> elements are block elements. inline-block does not add a line-break after the element, so the element can sit next to other elements. inline-block enable us to take control of width and height. */
        }
    </style>
</head>
<body>
    <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#news">News</a></li>
        <li><a href="#contactus">Contact us</a></li>
        <li><a href="#about">About</a></li>
    </ul>

    <p>Note: We use href="#" for test links. In a real web site this would be URLs.</p>
</body>
</html>
