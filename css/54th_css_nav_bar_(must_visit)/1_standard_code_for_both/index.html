<!-- The standard code used in both vertical, and horizontal navigation bars: -->



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ul {    /* We use 'ul' as css selector for list-style-type property because   'ul' tells which type of list it is containing  not 'li' tells. 
        If it is unordered list then use 'ul' and list is listed by        'bullets'  by default. 
        Or, If it is ordered list then us 'ol' and list is listed by     'numbers' by default. */    


            list-style-type: none;  /* Removes the bullets. A navigation bar does not need list markers */

            padding: 0px;   /*  to remove browser default padding. */
            margin: 0px;    /*  to remove browser default margin. */
        }
    </style>
</head>
<body>
    <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#news">News</a></li>
        <li><a href="#contactus">Contact us</a></li>
        <li><a href="#about">About</a></li>
    </ul>

    <p>Note: We use href="#" for test links. In a real web site this would be URLs.</p>
</body>
</html>
