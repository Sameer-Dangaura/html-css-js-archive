<!-- By default, the content of <th> elements are center-aligned and the content of <td> elements are left-aligned.

    To center-align the content of  <td> elements as well, 
    use   text-align: center: -->



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            width: 50%; /* making table only half of page  */
        }
        table, th, td{
            border: 1px solid black;
            border-collapse: collapse;  /* to avoid double border in table  */
        }
        td{
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Aligning the text to center in table</h1>

    <table>
        <tr>
            <th>First name</th>
            <th>Last name</th>
        </tr>
        <tr>
            <td>Ram</td>
            <td>Chaudhary</td>
        </tr>
        <tr>
            <td>Hari</td>
            <td>Chaudhary</td>
        </tr>
        <tr>
            <td>John</td>
            <td>Doe</td>
        </tr>
    </table>
</body>
</html>
