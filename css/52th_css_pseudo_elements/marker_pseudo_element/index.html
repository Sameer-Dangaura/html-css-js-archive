<!-- The ::marker pseudo-element selects the markers of list items. -->



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ::marker{
            color: red;
            font-size: 23px;
        }
    </style>
</head>
<body>
    <ul>
        <li>Tea</li>
        <li>Coffee</li>
        <li>Milk</li>
        <li>Juice</li>
    </ul>
    <ol>
        <li>First</li>
        <li>Second</li>
        <li>Third</li>
    </ol>
</body>
</html>
