

<!-- See the difference between outline and border: -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            border: 6px solid black;
            outline: 14px solid hotpink;
        }
    </style>
</head>
<body>
    <h1>Outline and Border:</h1>
    <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Ratione temporibus quam error culpa quidem fugit doloribus itaque, eum ut vel.</p>
</body>
</html>
