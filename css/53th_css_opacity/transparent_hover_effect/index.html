<!-- The opacity property is often used together with the :hover selector to change the opacity on mouse-over: -->




<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            margin: 0px;
        }
        img{
            padding: 20px;
        }
        img:hover{
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <h1>Hover over the images to see the effect</h1>

    <div>
        <img src="../img/sea_mirror.png" alt="sea mirror" style="width: 200px; height: 200px;">

        <img src="../img/sea_wave.png" alt="sea wave" style="width: 200px; height: 200px;">

        <img src="../img/night_view.png" alt="night view" style="width: 200px; height: 200px;">
    </div>
</body>
</html>
