<!-- # HTML elements are positioned static by default.

# Static positioned elements are not affected by the top, bottom, left, and right properties: -->



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div.static{
            position: static;
            border: 3px solid green;
            left: 30px; /* This style will not work with this statically positioned element. */
        }
    </style>
</head>
<body>
    <h2>position: static;</h2>
    <p>An element with <b> position: static;</b> is not positioned in any special way; it is always positioned according to the normal flow of the page:</p>

    <div class="static">
        <p>This div element has position: static;</p>
    </div>
</body>
</html>
