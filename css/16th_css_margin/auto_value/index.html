
<!-- Here, we are going to centering the element: withing it's container
 using margin: auto; -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            width: 190px;   /* width also plays important role for centering */
            margin: auto;
            border: 2px solid red;
        }
    </style>
</head>
<body>
    <h1>Centering the element: withing it's conatainer</h1>
    <p>You can set the margin property to auto to horizontally center the element within its container. The element will then take up the specified width, and the remaining space will be split equally between the left and right margins:</p>
</body>
</html>
