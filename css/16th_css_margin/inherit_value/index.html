
<!-- Here, we gonna inherit the margin of parent element to child element: -->



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #parent{
            width: 400px;
            margin-left: 120px;
            border: 2px solid red;
        }

        #child{
            margin-left: inherit; /* only margin value inherits. */
        }
    </style>
</head>
<body>
    <h1>Inherit value:</h1>
    <div id="parent">
        <p>This is parent div element.</p>

        <div id="child">
            <p>This is child div element.</p>
        </div>

    </div>

    <p>Only margin value inherits. That's why there is no border for child div element.</p>
</body>
</html>
