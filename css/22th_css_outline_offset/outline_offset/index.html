

<!-- using outline offset: -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            margin: 50px;
            border: 3px solid black;
            outline: 10px solid hotpink;
            outline-offset: 15px;
        }
    </style>
</head>
<body>
    <h1>Outline offset:</h1>
    <p>This paragraph has an outline 15px outside the border edge. The space between an element and its outline is transparent.
    </p>
</body>
</html>
