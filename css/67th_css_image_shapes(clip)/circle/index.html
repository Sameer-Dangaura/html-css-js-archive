<!-- Clip an image to a circle with radius or you can omit the radius: -->



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img{
            clip-path: circle();    /* clip an image to a circle with radius or you can omit the radius. */
        }
    </style>
</head>
<body>
    <h1>Clip an image to a circle</h1>
    <img src="../img/img6.png" alt="image" style="width: 600px; height: 400px;">
</body>
</html>
