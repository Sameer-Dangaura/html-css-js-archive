<!-- Example using justify-content: space-around 
 
The space-around value displays the flex items with space around them:

-->



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* styling div.flex-container */
        .flex-container{
            display: flex;  /* making div.flex-container as flex container */

            justify-content: space-around;    /* justify-content: space-around; displays the flex items with space before, between, and after the lines */

            background-color: blue;
        }

        /* styling those div which are direct child of div.flex-container */
        .flex-container > div{
            background-color: #f1f1f1;
            padding: 20px;
            margin: 20px;
            font-size: 30px;
        }
    </style>
</head>
<body>
    <h1>The justify-content property</h1>
    <p>justify-content: space-around; displays the flex items with space before, between, and after the lines:</p>

    <div class="flex-container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </div>
</body>
</html>
