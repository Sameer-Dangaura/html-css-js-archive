<!-- Example using align-items: flex-start -->




<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* styling div.flex-container */
        .flex-container{
            display: flex;  /* making div.flex-container as flex container */

            height: 200px;  /* we use a 200 pixels high container, to better demonstrate the align-items property. */

            align-items: flex-start;    /* flex-start value positions the flex items at the top of the container */

            background-color: blue;
        }

        /* styling those div which are direct child of div.flex-container */
        .flex-container > div{
            background-color: #f1f1f1;
            padding: 20px;
            margin: 20px;
            font-size: 30px;
        }
    </style>
</head>
<body>
    <h1>The align-items property</h1>
    <p>align-items: flex-start; aligns the flex items at the top of the container:</p>

    <div class="flex-container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </div>
</body>
</html>
