<!-- 
Using flex-wrap: nowrap is also done in "47th_css_float_examples/equal_height_boxes_by_flexbox".

Example using flex-wrap: nowrap

The nowrap value specifies that the flex items will not wrap (this is default):

-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* styling div.flex-container */
        .flex-container{
            display: flex;  /* making div.flex-container as flex container */

            flex-wrap: nowrap;  /* nowrap value specifies that the flex items will not wrap (this is default) */

            background-color: blue;
        }

        /* styling those div which are direct child of div.flex-container */
        .flex-container > div{
            background-color: #f1f1f1;
            padding: 20px;
            margin: 20px;
            font-size: 30px;
        }
    </style>
</head>
<body>
    <h1>The flex-wrap property</h1>
    <p>flex-wrap: nowrap; specifies that the flex items will not wrap (this is default):</p>

    <div class="flex-container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
        <div>9</div>
        <div>10</div>
        <div>11</div>
        <div>12</div>
    </div>

    <p style="background-color: yellow;">Try resizing the browser window!</p>
</body>
</html>
