<!-- Example using flex-flow 
 
The   flex-flow   property is a shorthand property for setting both the   flex-direction   and   flex-wrap   properties.

-->



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* styling div.flex-container */
        .flex-container{
            display: flex;  /* making div.flex-container as flex container */

            flex-flow: row wrap;    /* flex-flow   property is a shorthand property for setting both the   flex-direction   and   flex-wrap   properties. */

            background-color: blue;
        }

        /* styling those div which are direct child of div.flex-container */
        .flex-container > div{
            background-color: #f1f1f1;
            padding: 20px;
            margin: 20px;
            font-size: 30px;
        }
    </style>
</head>
<body>
    <h1>The flex-flow property</h1>
    <p>The flex-flow property is a shorthand property for the flex-direction and the flex-wrap properties.</p>

    <div class="flex-container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
        <div>9</div>
        <div>10</div>
        <div>11</div>
        <div>12</div>
    </div>

    <p style="background-color: yellow;">Try resizing the browser window!</p>
</body>
</html>
