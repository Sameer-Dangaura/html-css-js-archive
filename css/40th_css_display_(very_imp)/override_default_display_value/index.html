<!-- A common example for override the default display value : is making inline <li> elements for horizontal menus: -->




<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .override_list li{
            display: inline;        /* overriding block element to inline  */
        }
    </style>
</head>
<body>
    <h1>Display a unordered list of links as horizontal menus</h1>

    <h2>Before override:</h2>
    <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#contact_us">Contact us</a></li>
    </ul>

    <h2>After override:</h2>
    <ul class="override_list">
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#contact_us">Contact us</a></li>
    </ul>

</body>
</html>
