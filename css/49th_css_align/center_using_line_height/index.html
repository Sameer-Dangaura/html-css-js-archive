<!-- Another trick is to use the line-height property with a value that is equal to the height property: -->

<!-- This is not orginal version. For orginal version do visit w3schools's example... -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            border: 3px solid green;
        }
        .center{
            border: 3px solid #f1f1f1;  /* This is not actual border which we are assuming. This is just for checking the border of <p> inside's <div>. */
            text-align: center;
            line-height: 200px;
        }
    </style>
</head>
<body>
    <h1>Center with line-height and text-align center</h1>

    <div>
        <p class="center">I am centered.</p>
    </div>
</body>
</html>
