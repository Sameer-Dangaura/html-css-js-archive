<!-- If padding and line-height are not options, another solution is to use positioning and the transform property: -->




<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .centered{
            border: 3px solid green;
            height: 200px;
            position: relative; /* This establishes the .center div as a "relatively positioned" container. It is crucial because child elements with position: absolute will be positioned relative to this container. */

        }
        .centered p{
            margin: 0px;
            position: absolute; /* Positions the <p> element relative to the .center container.  This works because the parent .center has position: relative. */
            top: 50%;
            left: 50%;
        }

        .fullycentered{
            border: 3px solid green;
            height: 200px;
            position: relative; /* This establishes the .center div as a "relatively positioned" container. It is crucial because child elements with position: absolute will be positioned relative to this container. */
        }
        .fullycentered p{
            margin: 0px;
            position: absolute; /* Positions the <p> element relative to the .center container.  This works because the parent .center has position: relative. */

            top: 50%;   /* top 50% and left 50% is gonna help to translate(-50%,-50%). */
            left: 50%;
            transform: translate(-50%,-50%);    /* to understand this scroll down to this document. */
        }
    </style>
</head>
<body>
    <h1>Center with position and transform</h1>

    <p>In this example, we use positioning and the transform property to vertically and horizontally center the div element:</p>

    <h2>Before applying transform(-50%,-50%)</h2>

    <div class="centered">
        <p>I'm not fully centered.</p>
    </div>
    
    <h2>After applying transform(-50%, -50%)</h2>
    
    <div class="fullycentered">
        <p>I am fully centered.</p>
    </div>
</body>
</html>


<!--
Translate Syntax:
-----------------
____________________________
transform: translate(X, Y); |
____________________________|
X: Moves the element along the horizontal axis.
Y: Moves the element along the vertical axis.


# Meaning of translate(-50%, -50%) :
-----------------------------------
:
1) -50% on the X-axis
Moves the element left by 50% of its own width.

2) -50% on the Y-axis
Moves the element up by 50% of its own height.

This adjustment shifts the element’s center point (normally located at its top-left corner when positioned with top and left) to align with the intended reference point.



# Why Use translate(-50%, -50%)?
-------------------------------
:Understand these two points deeply.

-> When you set top: 50%; and left: 50%;, the top-left corner of the element is aligned at 50% of the parent’s width and height.

-> By applying translate(-50%, -50%), the element is shifted so that its center point aligns with that 50% position.



# Visual Example :
------------------
:
Suppose you have a box (<div>):

* Parent container dimensions: 200px by 200px
* Child box dimensions: 100px by 100px

If you only use:
------------
top: 50%;
left: 50%;
------------
The top-left corner of the child box will be at the center of the parent box, so part of the child box will overflow.


Using:
--------------------------------
transform: translate(-50%, -50%);
--------------------------------
Shifts the child box by half its width and height, making it perfectly centered inside the parent box.


-->
